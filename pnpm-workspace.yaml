# pnpm monorepo: one repo, multiple packages that evolve together.
#   packages/*  — platform-neutral code (the core SDK; future shared libs)
#   surfaces/*  — per-platform UIs that import the core (vscode now, android later)
packages:
  - "packages/*"
  - "surfaces/*"
allowBuilds:
  bigint-buffer: false
  bufferutil: false
  esbuild: false
  utf-8-validate: false
