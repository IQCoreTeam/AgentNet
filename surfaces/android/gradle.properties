# Big heap: the assets include a ~1GB rootfs tar, and packaging it through AAPT/the
# APK builder needs far more than the default. 6GB headroom avoids "Java heap space".
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
